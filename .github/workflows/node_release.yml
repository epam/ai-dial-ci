name: NodeJS Release workflow

on:
  workflow_call:
    inputs:
      promote:
        type: boolean
        description: Promote release to stable (for release-* branches only)
        default: false
      bypass-checks:
        type: boolean
        description: Do not fail pipeline if checks failed
        default: false
      format-checks-enabled:
        type: boolean
        description: Enable format_checks
        default: true
      format-checks-bypassed:
        type: boolean
        description: Do not fail pipeline if format_checks failed
        default: false
      style-checks-enabled:
        type: boolean
        description: Enable style_checks
        default: true
      style-checks-bypassed:
        type: boolean
        description: Do not fail pipeline if style_checks failed
        default: false
      code-checks-enabled:
        type: boolean
        description: Enable code_checks
        default: true
      code-checks-bypassed:
        type: boolean
        description: Do not fail pipeline if code_checks failed
        default: false
      ort-enabled:
        type: boolean
        description: Enable ORT scanning
        default: true
      ort-bypassed:
        type: boolean
        description: Do not fail pipeline if ORT scan failed
        default: false
      ort-version:
        type: string
        description: ORT version to use
        default: "latest"
      docker-build-enabled:
        type: boolean
        description: "Enable Docker build"
        default: true
      trivy-enabled:
        type: boolean
        description: Enable Trivy scanning
        default: true
      trivy-bypassed:
        type: boolean
        description: Do not fail pipeline if Trivy failed
        default: false
      trivy-severity:
        type: string
        description: Severities of vulnerabilities to fail the build
        default: "CRITICAL,HIGH"
      trivy-severity-for-sarif:
        type: string
        description: Severities of vulnerabilities in SARIF report
        default: "CRITICAL,HIGH"
      trivy-limit-severities-for-sarif:
        type: boolean
        description: By default SARIF format enforces output of all vulnerabilities regardless of configured severities. To override this behavior set this parameter to true and specify desired severities in the `trivy-severity-for-sarif` parameter
        default: true
      publish-enabled:
        type: boolean
        description: Enable publish to npmjs
        default: true
      node-version:
        type: string
        description: NodeJS version to use
        default: "22"
      maximize-build-space:
        type: boolean
        description: Maximize build space by removing unwanted software
        default: false
      runs-on:
        type: string
        description: Overrides jobs runs-on settings (json-encoded list)
        default: '["ubuntu-24.04"]'
      platforms:
        type: string
        description: Docker build platform
        default: "linux/amd64"
      dockerfile-path:
        type: string
        description: Path to the Dockerfile
        default: "Dockerfile"

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    uses: ./.github/workflows/node_test.yml
    with:
      bypass-checks: ${{ inputs.bypass-checks }}
      format-checks-enabled: ${{ inputs.format-checks-enabled }}
      format-checks-bypassed: ${{ inputs.format-checks-bypassed }}
      style-checks-enabled: ${{ inputs.style-checks-enabled }}
      style-checks-bypassed: ${{ inputs.style-checks-bypassed }}
      code-checks-enabled: ${{ inputs.code-checks-enabled }}
      code-checks-bypassed: ${{ inputs.code-checks-bypassed }}
      ort-enabled: ${{ inputs.ort-enabled }}
      ort-bypassed: ${{ inputs.ort-bypassed }}
      ort-version: ${{ inputs.ort-version }}
      node-version: ${{ inputs.node-version }}
      runs-on: ${{ inputs.runs-on }}

  calculate_version:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    outputs:
      next-version: ${{ steps.semantic_versioning.outputs.next-version }}
      latest-stable-tag: ${{ steps.semantic_versioning.outputs.latest-stable-tag }}
      is-release-candidate: ${{ steps.semantic_versioning.outputs.is-release-candidate }}
      is-release: ${{ steps.semantic_versioning.outputs.is-release }}
      is-latest: ${{ steps.semantic_versioning.outputs.is-latest }}
      release-line: ${{ steps.semantic_versioning.outputs.release-line }}
      changelog-mode: ${{ steps.semantic_versioning.outputs.changelog-mode }}
    steps:
      - uses: epam/ai-dial-ci/actions/semantic_versioning@3.1.3
        id: semantic_versioning
        with:
          promote: ${{ inputs.promote }}
  release:
    runs-on: ${{ fromJSON(inputs.runs-on) }}
    permissions:
      contents: write
      packages: write
      security-events: write
    needs:
      - calculate_version
      - test
    steps:
      - name: Maximize build space
        uses: nepalevov/maximize-build-space@046c48361370e2f3fa758bd2f10c6ce29109ef62 # v1.1.0
        if: ${{ inputs.maximize-build-space }}
        with:
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-large-packages: "true"
          remove-cached-tools: "true"
          remove-swapfile: "true"
          remove-java: "true"
          remove-swift: "true"
          remove-julia: "true"
          remove-browsers: "true"
          remove-cloud-tools: "true"
          remove-kubernetes-tools: "true"
          remove-powershell: "true"
          remove-container-tools: "true"
          remove-rust: "true"
          remove-python: "true"
          remove-node: "true"
          remove-go: "true"
          remove-ruby: "true"
          docker-cleanup: "true"
          set-tmpdir: "true"
      - uses: epam/ai-dial-ci/actions/generate_release_notes@3.1.3
        with:
          latest-tag: ${{ needs.calculate_version.outputs.latest-stable-tag }}
          use-merge-base: ${{ needs.calculate_version.outputs.changelog-mode == 'merge-base' }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
          token: ${{ secrets.ACTIONS_BOT_TOKEN }}
      - uses: epam/ai-dial-ci/actions/node_prepare@3.1.3
        with:
          node-version: ${{ inputs.node-version }}
          clean-install: true
          registry-url: "https://registry.npmjs.org"
      - name: Set version
        shell: bash
        run: |
          npm version ${{ needs.calculate_version.outputs.next-version }} --no-git-tag-version --allow-same-version
      # HACK: jobs.<job_id>.if does not support hashFiles function, so we have to copy it to the each step
      - if: ${{ inputs.docker-build-enabled && (hashFiles(inputs.dockerfile-path) != '') }}
        uses: epam/ai-dial-ci/actions/build_docker@3.1.3
        with:
          ghcr-username: ${{ github.actor }}
          ghcr-password: ${{ secrets.ACTIONS_BOT_TOKEN }}
          dockerhub-username: ${{ secrets.DOCKERHUB_LOGIN }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image-name: ghcr.io/${{ env.IMAGE_NAME }}
          image-tag: ${{ startsWith(github.ref, 'refs/heads/release-') && needs.calculate_version.outputs.next-version || 'development' }}
          push-enabled: true
          trivy-enabled: ${{ inputs.trivy-enabled }}
          bypass-checks: ${{ inputs.trivy-bypassed }}
          trivy-severity: ${{ inputs.trivy-severity }}
          trivy-severity-for-sarif: ${{ inputs.trivy-severity-for-sarif }}
          trivy-limit-severities-for-sarif: ${{ inputs.trivy-limit-severities-for-sarif }}
          platforms: ${{ inputs.platforms }}
          dockerfile-path: ${{ inputs.dockerfile-path }}
          image-extra-aliases: |
            ${{ env.IMAGE_NAME }}:${{ startsWith(github.ref, 'refs/heads/release-') && needs.calculate_version.outputs.next-version || 'development' }}
            ${{ startsWith(github.ref, 'refs/heads/release-') && needs.calculate_version.outputs.is-latest == 'true' && format('{0}:{1}', env.IMAGE_NAME, 'latest') || '' }}
            ${{ startsWith(github.ref, 'refs/heads/release-') && needs.calculate_version.outputs.is-latest == 'true' && format('{0}/{1}:{2}', 'ghcr.io', env.IMAGE_NAME, 'latest') || '' }}
      - name: Publish packages to npmjs
        if: ${{ inputs.publish-enabled }}
        shell: bash
        run: |
          #!/bin/bash
          # Builds and publishes the package to the npm registry.
          # Steps:
          # 1. (naive) check if a package with the same version is already exists in the registry
          # 2. build the package using either `build:publishable` (useful for monorepos) or `build` script
          # 3. publish the package using `publish` script with distribution tags:
          #    - development branch --> `development` distribution tag
          #    - release candidate version --> `{release-line}-rc` distribution tag (e.g. `1.0-rc`)
          #    - stable version
          #      - `latest` distribution tag if it's semantically latest stable version
          #      - `release-{release-line}` distribution tag (e.g. `release-1.0`) for other stable versions. HACK: we have to use this tag, otherwise npm will create `latest` by default
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" &>/dev/null; then
            echo "Version $PACKAGE_NAME@$PACKAGE_VERSION already published, skipping"; exit 0
          fi
          if node -e "process.exit(require('./package.json').scripts?.['build:publishable'] ? 0 : 1)"; then
            npm run build:publishable
          else
            npm run build
          fi
          if [ "$IS_DEVELOPMENT" = "true" ]; then
            npm run publish -- --tag "development"
          elif [ "$IS_RELEASE_CANDIDATE" = "true" ]; then
            npm run publish -- --tag "$RELEASE_LINE-rc"
          elif [ "$IS_RELEASE" = "true" ]; then
            if [ "$IS_LATEST" = "true" ]; then
              npm run publish -- --tag "latest"
            else
              npm run publish -- --tag "release-$RELEASE_LINE"
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          IS_DEVELOPMENT: ${{ github.ref == 'refs/heads/development' }}
          IS_RELEASE_CANDIDATE: ${{ needs.calculate_version.outputs.is-release-candidate == 'true' }}
          IS_RELEASE: ${{ needs.calculate_version.outputs.is-release == 'true' }}
          IS_LATEST: ${{ needs.calculate_version.outputs.is-latest == 'true' }}
          RELEASE_LINE: ${{ needs.calculate_version.outputs.release-line }}
      - uses: epam/ai-dial-ci/actions/publish_tag_release@3.1.3
        if: ${{ startsWith(github.ref, 'refs/heads/release-') }}
        with:
          tag-version: ${{ needs.calculate_version.outputs.next-version }}
          changelog-file: "/tmp/my_changelog" # comes from generate_release_notes step; TODO: beautify
          extra-commit-command: |
            git add package.json package-lock.json
            git commit -m '[skip ci] Update version' || true # upstream branch may already be updated
