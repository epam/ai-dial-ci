name: Run E2E Tests

on:
  repository_dispatch:
    types: [e2e-tests-workflow]

jobs:
  deploy_env:
    runs-on: ubuntu-latest
    environment:
      name: e2e-test
    outputs:
      github-app: ${{ github.event.client_payload.github-app }}
      github-sha: ${{ steps.sha.outputs.SHA }}
    steps:
      - name: Obtain short SHA
        id: sha
        env:
          TRIGGER_GITHUB_SHA: ${{ github.event.client_payload.github-sha}}
        run: |
          #!/bin/bash
          # shorten the commit SHA to the first 7 characters
          echo "SHA=${TRIGGER_GITHUB_SHA:0:7}" >>$GITHUB_OUTPUT
        shell: bash
      - name: Deploy environment
        id: deploy
        uses: digital-blueprint/gitlab-pipeline-trigger-action@c59b56e9d2688ab42c1304322ac8831a4ef6f7d2 # v1.4.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          trigger_token: ${{ secrets.DEPLOY_TRIGGER_TOKEN }}
          access_token: ${{ secrets.DEPLOY_ACCESS_TOKEN }}
          id: ${{ github.event.client_payload.gitlab-project-id }}
          ref: ${{ github.event.client_payload.gitlab-project-ref || vars.DEPLOY_REF }}
          variables: >
            {
              "TRIGGER_GITHUB_APP":"${{ github.event.client_payload.github-app }}",
              "TRIGGER_GITHUB_SHA": "${{ steps.sha.outputs.SHA }}",
              "GITHUB_STAGE": "deploy"
            }
  e2e_test:
    uses: epam/ai-dial-ci/.github/workflows/gh-e2e-test.yml@3.1.3
    needs:
      - deploy_env
    with:
      report-prefix: "${{ needs.deploy_env.outputs.github-app }}-${{ needs.deploy_env.outputs.github-sha }}"
      e2e-host: "https://chat-${{ needs.deploy_env.outputs.github-app }}-${{ needs.deploy_env.outputs.github-sha }}.${{ vars.E2E_BASE_DOMAIN }}"
      next-public-overlay-host: "https://overlay-${{ needs.deploy_env.outputs.github-app }}-${{ needs.deploy_env.outputs.github-sha }}.${{ vars.E2E_BASE_DOMAIN }}"
      environment-name: e2e-test
    secrets:
      E2E_ADMIN: ${{ secrets.E2E_ADMIN }}
      E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
      E2E_OVERLAY_USERNAME: ${{ secrets.E2E_OVERLAY_USERNAME }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      NEXT_PUBLIC_OVERLAY_USER_BUCKET: ${{ secrets.NEXT_PUBLIC_OVERLAY_USER_BUCKET }}
  destroy_env:
    runs-on: ubuntu-latest
    environment:
      name: e2e-test
    needs:
      - deploy_env
      - e2e_test
    if: ${{ !cancelled() }}
    steps:
      - name: Destroy environment
        id: destroy
        uses: digital-blueprint/gitlab-pipeline-trigger-action@c59b56e9d2688ab42c1304322ac8831a4ef6f7d2 # v1.4.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          trigger_token: ${{ secrets.DEPLOY_TRIGGER_TOKEN }}
          access_token: ${{ secrets.DEPLOY_ACCESS_TOKEN }}
          id: ${{ github.event.client_payload.gitlab-project-id }}
          ref: ${{ github.event.client_payload.gitlab-project-ref || vars.DEPLOY_REF }}
          variables: >
            {
              "TRIGGER_GITHUB_APP":"${{ needs.deploy_env.outputs.github-app }}",
              "TRIGGER_GITHUB_SHA": "${{ needs.deploy_env.outputs.github-sha }}",
              "GITHUB_STAGE": "destroy"
            }
