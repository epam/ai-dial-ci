name: Calculate Version

description: Calculate semver-format version based on current branch name and existing tags in git repository

inputs:
  filter-version:
    description: Operate within versions matched regex
    default: '[0-9]+\.[0-9]+'
  promote:
    description: When "true", skips RC increment and produces stable X.Y.Z tag instead. Works only on `release-*` branches
    default: "false"
  primary-branch-pattern:
    description: Regex pattern for the primary branch. Matching branch uses development flow
    default: '^development$'
  release-branch-pattern:
    description: Regex pattern for release branches. Branch name must end with X.Y to extract release line
    default: '^release-[0-9]+\.[0-9]+$'

outputs:
  current-version:
    description: Current tag baseline for version calculation
    value: ${{ steps.calculate-version.outputs.current-version }}
  next-version:
    description: Next computed version
    value: ${{ steps.calculate-version.outputs.next-version }}
  next-version-without-hyphens:
    description: Next computed version without hyphens (e.g. `0.1.0rc` instead of `0.1.0-rc`), for non-semver consumers (e.g. Python PEP 440)
    value: ${{ steps.calculate-version.outputs.next-version-without-hyphens }}
  latest-stable-tag:
    description: Semantically latest stable (`X.Y.Z`, ignores `X.Y.Z-rc`) git tag in the repository
    value: ${{ steps.calculate-version.outputs.latest-stable-tag }}
  is-release-candidate:
    description: The `next-version` is a release candidate
    value: ${{ steps.calculate-version.outputs.is-release-candidate }}
  is-release:
    description: The `next-version` is a stable release
    value: ${{ steps.calculate-version.outputs.is-release }}
  is-latest:
    description: Identifies if `next-version` is semantically greater than `latest-stable-tag`
    value: ${{ steps.calculate-version.outputs.is-latest }}
  release-line:
    description: X.Y part of the release branch, e.g. `1.0` for `release-1.0`. Empty for other branches
    value: ${{ steps.calculate-version.outputs.release-line }}
  changelog-mode:
    description: Changelog diff strategy - whether to use full branch history (`merge-base`) or tag-to-tag diff (`tag`)
    value: ${{ steps.calculate-version.outputs.changelog-mode }}

runs:
  using: "composite"
  steps:
    - name: Checkout Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
    - name: Install Tools
      run: |
        npm install -g semver
      shell: bash
    - name: Calculate Version
      id: calculate-version
      shell: bash
      run: |
        #!/bin/bash
        set -euo pipefail
        # set -x

        CURRENT_BRANCH=$(git symbolic-ref -q HEAD || true)
        CURRENT_BRANCH=${CURRENT_BRANCH##refs/heads/}
        CURRENT_BRANCH=${CURRENT_BRANCH:-HEAD}
        PRIMARY_BRANCH_PATTERN="${INPUT_PRIMARY_BRANCH_PATTERN:-^development$}"
        RELEASE_BRANCH_PATTERN="${INPUT_RELEASE_BRANCH_PATTERN:-^release-[0-9]+\.[0-9]+$}"

        PROMOTE="${INPUT_PROMOTE}"
        IS_RELEASE_CANDIDATE="false"
        IS_RELEASE="false"
        IS_LATEST="false"
        CHANGELOG_MODE="tag"
        RELEASE_LINE=""
        BRANCH_LINE=""
        DEV_SOURCE=""

        git fetch --tags

        if [ -z "${INPUT_FILTER_VERSION}" ]; then
          INPUT_FILTER_VERSION="[0-9]+\.[0-9]+"
        fi
        LATEST_STABLE_TAG=$(git tag | grep -E "^${INPUT_FILTER_VERSION}\.[0-9]+$" | sort -V | tail -1 || true)
        LATEST_STABLE_TAG_WITHOUT_FILTER=$(git tag | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -1 || true)
        LATEST_RC_TAG=$(git tag | grep -E "^${INPUT_FILTER_VERSION}\.0-rc\.[0-9]+$" | sort -V | tail -1 || true)
        LATEST_RC_TAG_WITHOUT_FILTER=$(git tag | grep -E "^[0-9]+\.[0-9]+\.0-rc\.[0-9]+$" | sort -V | tail -1 || true)

        if [[ "${CURRENT_BRANCH}" =~ ${PRIMARY_BRANCH_PATTERN} ]]; then
          # Determine which is greater: latest stable tag or latest RC tag
          # If latest stable tag is greater, next version is minor bump of given stable with dev suffix added
          # If latest RC tag is greater, next version is given RC line with dev suffix added
          # If no tags found, next version is 0.1.0 with dev suffix added
          # dev suffix is `-dev.N` where N is commit count from the tag that determines the version base
          # If branch line is greater than stable tag line or RC tag line then calculate next version based on branch line

          LATEST_STABLE_LINE=""
          if [[ -n "${LATEST_STABLE_TAG}" ]]; then
            LATEST_STABLE_LINE=$(echo "${LATEST_STABLE_TAG}" | grep -oE "^[0-9]+\.[0-9]+")
          fi
          LATEST_RC_LINE=""
          if [[ -n "${LATEST_RC_TAG}" ]]; then
            LATEST_RC_LINE=$(echo "${LATEST_RC_TAG}" | grep -oE "^[0-9]+\.[0-9]+")
          fi
          if [[ $CURRENT_BRANCH =~ ^development- ]]; then
            BRANCH_LINE="$(echo "${CURRENT_BRANCH##development-}" | awk -F. '{print $1}')"
            INITIAL_BRANCH_VERSION="${BRANCH_LINE}.0.0"
          else
            INITIAL_BRANCH_VERSION="0.0.0"
          fi

          DEV_SOURCE=""  # "stable", "rc", or ""
          if [[ -n "${LATEST_STABLE_LINE}" && -n "${LATEST_RC_LINE}" ]]; then
            if semver --include-prerelease "${LATEST_STABLE_LINE}.0" --range "<${INITIAL_BRANCH_VERSION}" >/dev/null 2>&1 && semver --include-prerelease "${LATEST_RC_LINE}.0" --range "<${INITIAL_BRANCH_VERSION}" >/dev/null 2>&1; then
              DEV_SOURCE="branch"
            elif semver --include-prerelease "${LATEST_STABLE_LINE}.0" --range ">=${LATEST_RC_LINE}.0" >/dev/null 2>&1; then
              DEV_SOURCE="stable"
            else
              DEV_SOURCE="rc"
            fi
          elif [[ -n "${BRANCH_LINE}" && -z "${LATEST_STABLE_LINE}" && -n "${LATEST_STABLE_TAG_WITHOUT_FILTER}" ]] && semver --include-prerelease "${LATEST_STABLE_TAG_WITHOUT_FILTER}" --range "<${INITIAL_BRANCH_VERSION}" >/dev/null 2>&1; then
            if [[ -n "${LATEST_RC_TAG}" && -n "${LATEST_STABLE_TAG_WITHOUT_FILTER}" ]] && semver --include-prerelease "${LATEST_RC_TAG}" --range ">${LATEST_STABLE_TAG_WITHOUT_FILTER}"; then
              DEV_SOURCE=rc
            else
              LATEST_STABLE_TAG="${LATEST_STABLE_TAG_WITHOUT_FILTER}"
              DEV_SOURCE="branch"
            fi
          elif [[ -n "${BRANCH_LINE}" && -z "${LATEST_RC_LINE}" && -n "${LATEST_RC_TAG_WITHOUT_FILTER}" ]] && semver --include-prerelease "${LATEST_RC_TAG_WITHOUT_FILTER}" --range "<${INITIAL_BRANCH_VERSION}" >/dev/null 2>&1; then
            LATEST_RC_TAG="${LATEST_RC_TAG_WITHOUT_FILTER}"
            DEV_SOURCE=branch
          elif [[ -n "${LATEST_STABLE_LINE}" ]]; then
            DEV_SOURCE="stable"
          elif [[ -n "${LATEST_RC_LINE}" ]]; then
            DEV_SOURCE="rc"
          fi

          case "${DEV_SOURCE}" in
            stable)
              DEV_N=$(git rev-list --count "${LATEST_STABLE_TAG}..HEAD")
              CURRENT_VERSION="${LATEST_STABLE_TAG}"
              NEXT_VERSION="$(semver "${CURRENT_VERSION}" --increment minor)-dev.${DEV_N}"
              ;;
            rc)
              DEV_N=$(git rev-list --count "${LATEST_RC_TAG}..HEAD")
              CURRENT_VERSION="${LATEST_RC_TAG}"
              NEXT_VERSION="$(semver "${LATEST_RC_LINE}.0" --increment minor)-dev.${DEV_N}"
              ;;
            branch)
              if [[ -n "${LATEST_STABLE_TAG}" && -n "${LATEST_RC_TAG}" ]]; then
                if semver --include-prerelease "${LATEST_STABLE_TAG}" --range ">${LATEST_RC_TAG}" >/dev/null 2>&1; then
                  DEV_N=$(git rev-list --count "${LATEST_STABLE_TAG}..HEAD")
                else
                  DEV_N=$(git rev-list --count "${LATEST_RC_TAG}..HEAD")
                fi
              elif [[ -n "${LATEST_STABLE_TAG}" ]]; then
                DEV_N=$(git rev-list --count "${LATEST_STABLE_TAG}..HEAD")
              elif [ -n "${LATEST_RC_TAG}" ]; then
                DEV_N=$(git rev-list --count "${LATEST_RC_TAG}..HEAD")
              else
                DEV_N=$(git rev-list --count HEAD)
              fi
              CURRENT_VERSION=""
              NEXT_VERSION="${INITIAL_BRANCH_VERSION}-dev.${DEV_N}"
              ;;
            *)
              DEV_N=$(git rev-list --count HEAD)
              CURRENT_VERSION=""
              NEXT_VERSION="$(semver "0.0.0" --increment minor)-dev.${DEV_N}"
              ;;
          esac

        elif [[ "${CURRENT_BRANCH}" =~ ${RELEASE_BRANCH_PATTERN} ]]; then
          RELEASE_LINE=$(echo "${CURRENT_BRANCH}" | grep -oE '[0-9]+\.[0-9]+$' || true)
          if [[ -z "${RELEASE_LINE}" ]]; then
            echo "::error::Can't extract valid {MAJOR.MINOR} version from release branch name '${CURRENT_BRANCH}'. Expected branch name ending with X.Y (for example: release-1.0)"
            exit 2
          fi

          STABLE_TAG=$(git tag | grep -E "^${RELEASE_LINE}\.[0-9]+$" | sort -V | tail -1 || true)

          if [[ -n "${STABLE_TAG}" ]]; then
            # Stable tag found = at least one release on this release line --> bump patch version
            CURRENT_VERSION="${STABLE_TAG}"
            NEXT_VERSION=$(semver "${CURRENT_VERSION}" --increment patch)
            IS_RELEASE="true"
            if [[ -z "${LATEST_STABLE_TAG_WITHOUT_FILTER}" ]] || semver --include-prerelease "${NEXT_VERSION}" --range ">${LATEST_STABLE_TAG_WITHOUT_FILTER}" >/dev/null 2>&1; then
              IS_LATEST="true"
            fi

          elif [[ "${PROMOTE}" == "true" ]]; then
            # No stable tag found + promote trigger passed --> produce first stable release
            CURRENT_VERSION=$(git tag | grep -E "^${RELEASE_LINE}\.0-rc\.[0-9]+$" | sort -V | tail -1 || true)
            NEXT_VERSION="${RELEASE_LINE}.0"
            CHANGELOG_MODE="merge-base"
            IS_RELEASE="true"
            if [[ -z "${LATEST_STABLE_TAG_WITHOUT_FILTER}" ]] || semver --include-prerelease "${NEXT_VERSION}" --range ">${LATEST_STABLE_TAG_WITHOUT_FILTER}" >/dev/null 2>&1; then
              IS_LATEST="true"
            fi

          else
            # No stable tag found, no promote trigger --> bump RC version
            IS_RELEASE_CANDIDATE="true"
            LATEST_RC=$(git tag | grep -E "^${RELEASE_LINE}\.0-rc\.[0-9]+$" | sort -V | tail -1 || true)

            if [[ -n "${LATEST_RC}" ]]; then
              CURRENT_VERSION="${LATEST_RC}"
              NEXT_VERSION=$(semver "${LATEST_RC}" --increment prerelease --preid rc)
            else
              CURRENT_VERSION=""
              NEXT_VERSION="${RELEASE_LINE}.0-rc.0"
            fi
          fi
          if [[ -z "${LATEST_STABLE_TAG}" && -n "${LATEST_STABLE_TAG_WITHOUT_FILTER}" ]] && semver --include-prerelease "${LATEST_STABLE_TAG_WITHOUT_FILTER}" --range "<${RELEASE_LINE}.0" >/dev/null 2>&1; then
            LATEST_STABLE_TAG="${LATEST_STABLE_TAG_WITHOUT_FILTER}"
          fi

        else
          echo "::error::Unsupported branch name '${CURRENT_BRANCH}'. Provided branch must match '${PRIMARY_BRANCH_PATTERN}' or '${RELEASE_BRANCH_PATTERN}' patterns"
          exit 2
        fi

        # Sanitize next version for non-semver consumers by:
        # 1. Replaces `-dev.` with `.dev` (to match PEP 440 release format)
        # 2. Replaces `-rc.` with `rc`
        # 3. Remove all hyphens
        # e.g. 1.0.0 --> 1.0.0, 1.1.0-dev.42 --> 1.1.0.dev42, 1.0.0-rc.1 --> 1.0.0rc1
        NEXT_VERSION_WITHOUT_HYPHENS=$(echo "${NEXT_VERSION}" |
          sed 's/-dev\./\.dev/g' |
          sed 's/-rc\./rc/g' |
          sed 's/-//g')

        # Outputs to stdout and job summary
        OUTPUTS_SUMMARY=$(
          cat <<EOF
        | Parameter                    | Value                         |
        | ---------------------------- | ----------------------------- |
        | current-version              | $CURRENT_VERSION              |
        | next-version                 | $NEXT_VERSION                 |
        | next-version-without-hyphens | $NEXT_VERSION_WITHOUT_HYPHENS |
        | latest-stable-tag            | $LATEST_STABLE_TAG            |
        | is-release-candidate         | $IS_RELEASE_CANDIDATE         |
        | is-release                   | $IS_RELEASE                   |
        | is-latest                    | $IS_LATEST                    |
        | release-line                 | $RELEASE_LINE                 |
        | changelog-mode               | $CHANGELOG_MODE               |
        EOF
        )
        echo "$OUTPUTS_SUMMARY"
        echo "$OUTPUTS_SUMMARY" >>"$GITHUB_STEP_SUMMARY"

        # Outputs
        cat <<EOF >>"${GITHUB_OUTPUT}"
        current-version=${CURRENT_VERSION}
        next-version=${NEXT_VERSION}
        next-version-without-hyphens=${NEXT_VERSION_WITHOUT_HYPHENS}
        latest-stable-tag=${LATEST_STABLE_TAG}
        is-release-candidate=${IS_RELEASE_CANDIDATE}
        is-release=${IS_RELEASE}
        is-latest=${IS_LATEST}
        release-line=${RELEASE_LINE}
        changelog-mode=${CHANGELOG_MODE}
        EOF
      env:
        INPUT_FILTER_VERSION: ${{ inputs.filter-version }}
        INPUT_PROMOTE: ${{ inputs.promote }}
        INPUT_PRIMARY_BRANCH_PATTERN: ${{ inputs.primary-branch-pattern }}
        INPUT_RELEASE_BRANCH_PATTERN: ${{ inputs.release-branch-pattern }}
