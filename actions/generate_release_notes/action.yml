name: Generate Release Notes
description: Generate release notes based on conventional commits

inputs:
  latest-tag:
    description: Semantically latest git tag in the repository
    required: true
  use-merge-base:
    description: Use latest-tag as changelog base, ignoring branch tags from git describe (full changelog since last stable release; full history if latest-tag is empty)
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        # HACK: there's a bug in actions/checkout, where all subsequent checkouts within single job with `lfs: true`
        # doesn't actually fetch LFS files. So, we have to use lfs even we don't need it here.
        # ref: https://github.com/actions/checkout/issues/270
        lfs: true
    - name: Generate changelog
      run: |
        #!/bin/bash

        # This script generates a changelog based on the commits since the last tag in the repository or the latest tag specified as an input.
        # It categorizes the commits into features, fixes, and other changes.
        # The script outputs the changelog to a /tmp/my_changelog file.

        # set -x

        commits_log_file="/tmp/commits_log"
        shipped_commits_log_file="/tmp/shipped_commits_log"
        breaking_changes_file="/tmp/changelog_breaking_changes"
        features_file="/tmp/changelog_features"
        fixes_file="/tmp/changelog_fixes"
        docs_file="/tmp/changelog_docs"
        tests_file="/tmp/changelog_tests"
        ci_file="/tmp/changelog_ci"
        other_file="/tmp/changelog_other"
        changelog_file="/tmp/my_changelog"

        append_markdown_section() {
          local title="$1"
          local file="$2"

          if [[ -s "${file}" ]]; then
            {
              echo -e "## ${title}\n"
              cat "${file}"
              echo ""
            } >>"${changelog_file}"
          fi
        }

        if [[ "${INPUT_USE_MERGE_BASE}" == "true" ]]; then
          # Full changelog since last stable release: use the provided stable tag as baseline.
          # If no stable tag exists (first-ever release), fall back to full history.
          LAST_TAG="${INPUT_LATEST_TAG:-NO}"
        else
          # Incremental changelog: tag-based, branch tags have priority
          latest_tag_repo="${INPUT_LATEST_TAG}"                                      # Trying to obtain the last tag if provided as ENV variable
          latest_tag_branch=$(git describe --tags --abbrev=0 2>/dev/null || echo '') # Trying to obtain the latest GIT tag in the current branch

          # If the branch tag is an ancestor of the provided stable tag, it belongs to a previous
          # release line (e.g. 1.0.0-rc.0 visible from release-1.1 via the shared branch point).
          # Discard it so the stable tag is used as the baseline instead.
          if [[ -n "${latest_tag_branch}" && -n "${latest_tag_repo}" ]] &&
            git merge-base --is-ancestor "${latest_tag_branch}" "${latest_tag_repo}" 2>/dev/null; then
            latest_tag_branch=""
          fi

          # Local branch tags should have priority.
          # If no tags are found in both methods, it sets LAST_TAG as 'NO'
          LAST_TAG="${latest_tag_branch:-${latest_tag_repo:-NO}}"
        fi

        # Fetch all commit messages if no tags found, else fetch messages since the LAST_TAG
        if [[ "${LAST_TAG}" == "NO" ]]; then
          git log --pretty=format:"%s" >${commits_log_file}
        else
          # Layer 1: patch-level dedup (catches clean cherry-picks by comparing patch-ids)
          git log --cherry-pick --right-only "${LAST_TAG}...HEAD" --pretty=format:"%s" >${commits_log_file}

          # Layer 2: message-level dedup (catches conflict-resolved or amended cherry-picks)
          git log "${LAST_TAG}" --pretty=format:"%s" | sort -u >${shipped_commits_log_file}
          grep -Fxvf ${shipped_commits_log_file} ${commits_log_file} >"${commits_log_file}_deduped" || true
          mv "${commits_log_file}_deduped" ${commits_log_file}
        fi

        sort --unique --output ${commits_log_file}{,} # Sorting commits and removing duplicates (inline)

        sed -i '/\[skip ci\] Update version/d' ${commits_log_file} # Removing '[skip ci] Update version' commits
        sed -i '/^Merge branch/d' ${commits_log_file}              # Removing merge commits

        # Creating empty files for each category
        echo -n '' >${breaking_changes_file}
        echo -n '' >${features_file}
        echo -n '' >${fixes_file}
        echo -n '' >${docs_file}
        echo -n '' >${tests_file}
        echo -n '' >${ci_file}
        echo -n '' >${other_file}
        echo -n '' >${changelog_file}

        # Regular expression pattern for supported conventional commits with optional scope
        SUPPORTED_CONVENTIONAL_COMMIT_REGEX='^(fix|feat|docs|test|ci|chore)(\(([a-zA-Z0-9_.-]+)\))?(!)?:[[:space:]]+(.+)$'

        # Parse commits once and route them into their categories
        while IFS= read -r l; do
          [[ -z "${l}" ]] && continue

          if [[ "${l}" =~ ${SUPPORTED_CONVENTIONAL_COMMIT_REGEX} ]]; then
            TYPE="${BASH_REMATCH[1]}"
            SCOPE="${BASH_REMATCH[3]}"
            BREAKING_FLAG="${BASH_REMATCH[4]}"
            DESCRIPTION="${BASH_REMATCH[5]}"

            if [[ -n "${SCOPE}" ]]; then
              ENTRY="* (${SCOPE}) ${DESCRIPTION}"
            else
              ENTRY="* ${DESCRIPTION}"
            fi

            if [[ -n "${BREAKING_FLAG}" ]]; then
              echo "${ENTRY}" >>${breaking_changes_file}
            fi

            case "${TYPE}" in
            feat)
              echo "${ENTRY}" >>${features_file}
              ;;
            fix)
              echo "${ENTRY}" >>${fixes_file}
              ;;
            docs)
              echo "${ENTRY}" >>${docs_file}
              ;;
            test)
              echo "${ENTRY}" >>${tests_file}
              ;;
            ci)
              echo "${ENTRY}" >>${ci_file}
              ;;
            # chore is not categorized in the changelog and is treated as "other"
            *)
              echo "${ENTRY}" >>${other_file}
              ;;
            esac
          else
            echo "* ${l}" >>${other_file}
          fi
        done <${commits_log_file}

        # Compiling the final changelog file with markdown headers for each category
        append_markdown_section "BREAKING CHANGES" "${breaking_changes_file}"
        append_markdown_section "Features" "${features_file}"
        append_markdown_section "Fixes" "${fixes_file}"
        append_markdown_section "Docs" "${docs_file}"
        append_markdown_section "Tests" "${tests_file}"
        append_markdown_section "CI" "${ci_file}"
        append_markdown_section "Other" "${other_file}"

        if [[ -s ${changelog_file} ]]; then
          echo "Changelog generated successfully: ${changelog_file}"
        else
          echo "::warning::Changelog is empty"
        fi
      env:
        INPUT_LATEST_TAG: ${{ inputs.latest-tag }}
        INPUT_USE_MERGE_BASE: ${{ inputs.use-merge-base }}
      shell: bash
