---
# See https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md for explanations of each rule
# First, set the default
default: true

# Per-rule settings in alphabetical order
code-block-style: # MD046
  style: "fenced"
emphasis-style: false # MD049
heading-style: # MD003
  style: "atx"
hr-style: # MD035
  style: "---"
line-length: # MD013
  code_blocks: false
  tables: false
  headings: true
  heading_line_length: 100
  line_length: 800
no-blanks-blockquote: false #MD028
no-duplicate-heading: # MD024
  siblings_only: true
no-hard-tabs: # MD010
  ignore_code_languages:
    - makefile
no-inline-html: # MD033
  allowed_elements:
    - details
    - summary
  table_allowed_elements:
    - br
ol-prefix: # MD029
  style: "one"
ul-style: # MD004
  style: "dash"
